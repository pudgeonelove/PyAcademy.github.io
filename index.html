<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Helper| Финансовый трекер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #090a0f;
            --bg-card: #151823;
            --bg-input: #0e1017;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --income: #10b981;
            --income-glow: rgba(16, 185, 129, 0.2);
            --expense: #f43f5e;
            --expense-glow: rgba(244, 63, 94, 0.2);
            --border: #262b3d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* Хедер и Карточка Баланса */
        .dashboard {
            grid-column: 1 / -1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); }
        
        .balance-area { text-align: center; margin: 10px 0; }
        .balance-title { color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .balance-amount { font-size: 48px; font-weight: 800; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }

        .stats { display: flex; gap: 20px; }
        .stat-box { 
            flex: 1; 
            background: var(--bg-input); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-box.income { border-bottom: 3px solid var(--income); }
        .stat-box.expense { border-bottom: 3px solid var(--expense); }
        .stat-title { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .stat-amount { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .income-text { color: var(--income); }
        .expense-text { color: var(--expense); }

        /* Форма добавления */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .panel h3 { font-size: 18px; margin-bottom: 20px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        
        input, select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .radio-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .radio-btn {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            color: var(--text-muted);
        }
        
        /* Скрываем стандартные кружочки радио-кнопок */
        input[type="radio"] { display: none; }
        
        #type-income:checked + label { background: var(--income-glow); border-color: var(--income); color: var(--income); }
        #type-expense:checked + label { background: var(--expense-glow); border-color: var(--expense); color: var(--expense); }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 20px var(--accent-glow);
        }
        .btn-submit:hover { transform: translateY(-2px); background: #2563eb; }

        /* История транзакций */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .transaction {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }
        .transaction:hover { transform: translateX(5px); border-color: #333a52; }
        
        /* Цветная полоска слева */
        .transaction::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
        }
        .transaction.inc::before { background: var(--income); }
        .transaction.exp::before { background: var(--expense); }

        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-name { font-weight: 600; font-size: 15px; }
        .t-date { font-size: 12px; color: var(--text-muted); }
        
        .t-right { display: flex; align-items: center; gap: 15px; }
        .t-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px; }
        .t-amount.inc { color: var(--income); }
        .t-amount.exp { color: var(--expense); }

        .delete-btn {
            background: rgba(244, 63, 94, 0.1);
            color: var(--expense);
            border: none;
            width: 32px; height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px;
            transition: 0.2s;
            opacity: 0;
        }
        .transaction:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: var(--expense); color: #fff; }

        .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 30px 0; }

        /* Адаптация для телефонов */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .stats { flex-direction: column; }
            .transaction:hover .delete-btn { opacity: 1; } /* На телефоне кнопка удаления видна всегда */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard">
            <div class="header">
                <div class="logo">🛡️ <span>Money</span>Guard</div>
                <button onclick="clearAll()" style="background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px;">Сбросить всё</button>
            </div>
            
            <div class="balance-area">
                <div class="balance-title">Текущий баланс</div>
                <div class="balance-amount" id="balance">0 <span>с</span></div>
            </div>

            <div class="stats">
                <div class="stat-box income">
                    <div class="stat-title">Доходы (Всего)</div>
                    <div class="stat-amount income-text" id="money-plus">+0</div>
                </div>
                <div class="stat-box expense">
                    <div class="stat-title">Расходы (Всего)</div>
                    <div class="stat-amount expense-text" id="money-minus">-0</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>Добавить запись</h3>
            <form id="form">
                <div class="radio-group">
                    <input type="radio" name="type" id="type-income" value="income">
                    <label for="type-income" class="radio-btn">В плюс (+)</label>
                    
                    <input type="radio" name="type" id="type-expense" value="expense" checked>
                    <label for="type-expense" class="radio-btn">В минус (-)</label>
                </div>

                <div class="form-group">
                    <label for="text">Название (например: Покупка ткани, Шаурма)</label>
                    <input type="text" id="text" placeholder="На что ушли деньги?" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="amount">Сумма</label>
                    <input type="number" id="amount" placeholder="Введите сумму..." required min="1">
                </div>

                <button class="btn-submit" type="submit">Добавить в историю</button>
            </form>
        </div>

        <div class="panel">
            <h3>История транзакций</h3>
            <div class="history-list" id="list">
                </div>
        </div>
    </div>

    <script>
        // Получаем элементы интерфейса
        const balance = document.getElementById('balance');
        const moneyPlus = document.getElementById('money-plus');
        const moneyMinus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');

        // Вытаскиваем данные из LocalStorage браузера. Если там пусто - создаем пустой массив [].
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        // Функция: Генерируем случайный ID для каждой записи
        function generateID() {
            return Math.floor(Math.random() * 100000000);
        }

        // Функция: Получаем красивую дату (например, 22.10.2024)
        function getCurrentDate() {
            const date = new Date();
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
        }

        // Функция: Добавление транзакции
        function addTransaction(e) {
            e.preventDefault(); // Останавливаем перезагрузку страницы при нажатии на кнопку

            if (textInput.value.trim() === '' || amountInput.value.trim() === '') {
                alert('Пожалуйста, введите название и сумму');
                return;
            }

            // Узнаем, что выбрал пользователь: доход или расход
            const type = document.querySelector('input[name="type"]:checked').value;
            let amount = parseFloat(amountInput.value);

            // Формируем объект данных
            const transaction = {
                id: generateID(),
                text: textInput.value,
                amount: amount,
                type: type,
                date: getCurrentDate()
            };

            // Добавляем в наш массив
            transactions.push(transaction);

            // Обновляем всё на экране
            addTransactionDOM(transaction);
            updateValues();
            updateLocalStorage();

            // Очищаем форму
            textInput.value = '';
            amountInput.value = '';
        }

        // Функция: Отрисовка транзакции в HTML (Создаем блоки кодом)
        function addTransactionDOM(transaction) {
            // Удаляем надпись "Пока пусто", если она есть
            const emptyState = document.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const sign = transaction.type === 'income' ? '+' : '-';
            const cssClass = transaction.type === 'income' ? 'inc' : 'exp';

            const item = document.createElement('div');
            item.classList.add('transaction', cssClass);

            item.innerHTML = `
                <div class="t-info">
                    <span class="t-name">${transaction.text}</span>
                    <span class="t-date">${transaction.date}</span>
                </div>
                <div class="t-right">
                    <span class="t-amount ${cssClass}">${sign} ${Math.abs(transaction.amount)}</span>
                    <button class="delete-btn" onclick="removeTransaction(${transaction.id})">×</button>
                </div>
            `;

            list.prepend(item); // Добавляем новую запись в начало списка
        }

        // Функция: Подсчет математики (Баланс, Доходы, Расходы)
        function updateValues() {
            let totalIncome = 0;
            let totalExpense = 0;

            transactions.forEach(t => {
                if (t.type === 'income') {
                    totalIncome += t.amount;
                } else {
                    totalExpense += t.amount;
                }
            });

            const totalBalance = totalIncome - totalExpense;

            // Форматируем числа, чтобы тысячи отделялись пробелом (1 000)
            balance.innerText = totalBalance.toLocaleString('ru-RU') + ' ₸'; // Можно заменить на сом (с) или руб (₽)
            moneyPlus.innerText = '+' + totalIncome.toLocaleString('ru-RU');
            moneyMinus.innerText = '-' + totalExpense.toLocaleString('ru-RU');
        }

        // Функция: Удаление транзакции по клику на крестик
        function removeTransaction(id) {
            // Оставляем только те транзакции, ID которых НЕ равен удаляемому
            transactions = transactions.filter(t => t.id !== id);
            
            updateLocalStorage();
            init(); // Перерисовываем весь интерфейс
        }

        // Функция: Очистить всю историю
        function clearAll() {
            if(confirm('Удалить всю историю финансов? Это действие нельзя отменить.')) {
                transactions = [];
                updateLocalStorage();
                init();
            }
        }

        // Функция: Сохранение данных в кэш браузера
        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Функция: Запуск приложения
        function init() {
            list.innerHTML = ''; // Очищаем список
            
            if (transactions.length === 0) {
                list.innerHTML = '<div class="empty-state">История пуста. Добавьте первую запись!</div>';
            } else {
                // Если данные есть, рисуем их
                transactions.forEach(addTransactionDOM);
            }
            
            updateValues();
        }

        // Запуск
        init();

        // Слушатель на кнопку в форме
        form.addEventListener('submit', addTransaction);
    </script>
</body>
    </html>
