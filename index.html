<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyAcademy | Cyber Learning Environment</title>
    <style>
        /* ==========================================================================
           1. ПЕРЕМЕННЫЕ И ОСНОВЫ (ROOT & RESET)
           ========================================================================= */
        :root {
            --bg-deep: #050505;
            --bg-card: #0d0d0d;
            --voltage-yellow: #ffe066;
            --voltage-yellow-glow: rgba(255, 224, 102, 0.4);
            --nitro-blue: #00f2ff;
            --matrix-green: #00ff66;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-space: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* ==========================================================================
           2. ФОНОВЫЕ ЭФФЕКТЫ
           ========================================================================= */
        #nitro-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 1) 0%, rgba(5, 5, 5, 1) 100%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 2px);
            background-size: 100% 100%, 100% 3px;
            z-index: -1;
        }

        /* ==========================================================================
           3. ЛЕВОЕ МЕНЮ (SIDEBAR)
           ========================================================================= */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
            background: #080808; border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }

        .sidebar-header { padding: 30px 25px; border-bottom: 1px solid #151515; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--voltage-yellow); }

        .tab-switcher { display: flex; padding: 20px; gap: 10px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid #222; background: transparent;
            color: var(--text-muted); cursor: pointer; border-radius: 8px; font-size: 12px;
            text-transform: uppercase; font-weight: 700; transition: 0.3s;
        }
        .tab-btn.active { background: #111; border-color: var(--voltage-yellow); color: #fff; }

        .progress-container { padding: 10px 25px 25px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .bar-bg { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--voltage-yellow); width: 0%; transition: width 0.8s ease; }

        .nav-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
        .nav-item {
            width: 100%; display: flex; align-items: center; padding: 14px 15px;
            background: transparent; border: none; color: #666; cursor: pointer;
            border-radius: 12px; margin-bottom: 5px; transition: 0.2s; text-align: left;
        }
        .nav-item:hover { background: #111; color: #fff; }
        .nav-item.active { background: #111; color: var(--voltage-yellow); }
        .nav-item.done .nav-check { color: var(--matrix-green); opacity: 1; }
        .nav-num { font-size: 10px; margin-right: 15px; opacity: 0.5; font-family: monospace; }
        .nav-name { flex: 1; font-size: 14px; font-weight: 500; }
        .nav-check { opacity: 0; font-size: 12px; }

        /* ==========================================================================
           4. ОСНОВНОЙ КОНТЕНТ (MAIN CONTENT)
           ========================================================================= */
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; position: relative; }
        @media (max-width: 900px) { .main-content { margin-left: 0; } }

        .content-header {
            position: sticky; top: 0; background: rgba(5,5,5,0.8);
            backdrop-filter: blur(10px); padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #151515; z-index: 50;
        }

        .view-section { display: none; padding: 40px; max-width: 1000px; margin: 0 auto; }
        .view-section.active { display: block; }

        /* ==========================================================================
           5. ВИДЖЕТ КОДА (IDE)
           ========================================================================= */
        .ide-widget {
            background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 16px;
            margin: 30px 0; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .ide-header { background: #111; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .ide-file-info { font-family: monospace; font-size: 12px; color: var(--text-muted); }
        .run-btn {
            background: var(--voltage-yellow); color: #000; border: none;
            padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }
        .run-btn:hover { transform: translateY(-1px); box-shadow: 0 0 15px var(--voltage-yellow-glow); }
        
        .ide-body { padding: 25px; font-family: 'Fira Code', monospace; font-size: 15px; color: #cfcfcf; }
        .ide-terminal { background: #000; padding: 15px 25px; border-top: 1px solid #1a1a1a; display: none; }
        .ide-terminal.active { display: block; }
        .term-head { font-size: 10px; text-transform: uppercase; color: #444; margin-bottom: 5px; }
        .term-prefix { color: var(--matrix-green); margin-right: 10px; }

        /* ==========================================================================
           6. КАРТОЧКИ ВИДЕО
           ========================================================================= */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .video-card {
            background: var(--bg-card); border: 1px solid #1a1a1a; padding: 25px;
            border-radius: 20px; position: relative; transition: 0.3s; overflow: hidden;
        }
        .video-card:hover { border-color: var(--nitro-blue); transform: translateY(-5px); }
        .v-icon-layer { color: var(--nitro-blue); margin-bottom: 15px; }
        .v-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .v-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        .v-btn-watch {
            background: #fff; color: #000; border: none; padding: 12px;
            width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .v-btn-watch:hover { background: var(--nitro-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }

        /* ==========================================================================
           7. МОДАЛКИ И УВЕДОМЛЕНИЯ
           ========================================================================= */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 200; display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .overlay.active { display: flex; }
        .cyber-modal {
            background: var(--bg-card); border: 1px solid var(--voltage-yellow);
            border-radius: 24px; padding: 40px; max-width: 450px; width: 100%; text-align: center;
        }
        .modal-btn {
            background: #fff; color: #000; border: none; width: 100%; padding: 16px;
            border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 25px;
        }

        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 999; }
        .toast {
            background: #111; border-left: 4px solid var(--matrix-green);
            padding: 15px 25px; border-radius: 8px; color: #fff; margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Кнопки переключения мобильного меню */
        #mobile-nav-toggle, #mobile-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; display: none; }
        @media (max-width: 900px) { #mobile-nav-toggle, #mobile-close { display: block; } }

        .neon-text { text-shadow: 0 0 10px var(--voltage-yellow-glow); color: #fff; }
        .next-lesson-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .next-lesson-btn:hover { border-color: var(--voltage-yellow); color: var(--voltage-yellow); }
    </style>
</head>
<body>

    <div id="nitro-bg"></div>
    <div id="toast-container"></div>

    <div id="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="logo">🐍 <span>Py</span>Academy</div>
                    <button id="mobile-close" onclick="toggleMobileNav()">×</button>
                </div>
            </div>
            
            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchMainTab('course', this)">Курс</button>
                <button class="tab-btn" onclick="switchMainTab('videos', this)">Видео</button>
            </div>

            <div class="progress-container">
                <div class="progress-info">
                    <span>ПРОГРЕСС СИНХРОНИЗАЦИИ</span>
                    <span id="p-val">0%</span>
                </div>
                <div class="bar-bg"><div class="bar-fill" id="p-fill"></div></div>
            </div>

            <nav class="nav-list" id="nav-list"></nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div style="display:flex; align-items:center; gap:15px;">
                    <button id="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
                    <h4 id="head-title" style="color:var(--text-muted)">Инициализация...</h4>
                </div>
                <div style="font-size: 11px; letter-spacing: 1px; color: var(--matrix-green); font-weight: 900;">
                    ● SYSTEM_ONLINE
                </div>
            </header>

            <section id="view-course" class="view-section active">
                <div id="lesson-content-area"></div>
            </section>

            <section id="view-videos" class="view-section">
                <h1 class="neon-text" style="margin-bottom: 10px;">Медиа-архив</h1>
                <p style="color:var(--text-muted)">Закрытые лекции и разборы полетов.</p>
                <div class="video-grid" id="video-grid-container"></div>
            </section>
        </main>
    </div>

    <div class="overlay" id="finish-overlay">
        <div class="cyber-modal">
            <h2 style="color: var(--voltage-yellow); margin-bottom: 15px;">СИСТЕМА ОСВОЕНА</h2>
            <p>Вы успешно завершили базовый протокол обучения Python. Все узлы синхронизированы.</p>
            <button class="modal-btn" onclick="resetCourse()">ПЕРЕЗАГРУЗКА ЦИКЛА</button>
        </div>
    </div>

    <script>
        // 1. КОНФИГУРАЦИЯ ВИДЕО (ЖЕСТКО В КОДЕ)
        const HARDCODED_VIDEOS = [
            { title: "Установка среды", desc: "Настройка VS Code и Python 3.12 на Windows/Mac.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Переменные", desc: "Как компьютер запоминает данные.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Циклы", desc: "Автоматизация повторяющихся действий.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { title: "Списки", desc: "Работа с массивами и базами данных.", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
        ];

        // 2. ДАННЫЕ УРОКОВ
        const lessons = [
            { id: 1, title: "Функция Print", subtitle: "Вывод данных", code: "print('System Ready')\n# Это твой первый код", out: "System Ready" },
            { id: 2, title: "Переменные", subtitle: "Ячейки памяти", code: "hero = 'Neo'\nprint(f'Welcome, {hero}')", out: "Welcome, Neo" },
            { id: 3, title: "Математика", subtitle: "Операторы", code: "a = 5\nb = 10\nprint(a + b)", out: "15" },
            { id: 4, title: "Условия", subtitle: "Ветвление", code: "xp = 100\nif xp >= 100:\n    print('Level Up!')", out: "Level Up!" },
            { id: 5, title: "Списки", subtitle: "Коллекции", code: "inv = ['Sword', 'Shield']\nprint(inv[0])", out: "Sword" },
            { id: 6, title: "Циклы", subtitle: "Повторения", code: "for i in range(3):\n    print('Looping...')", out: "Looping...\nLooping...\nLooping..." }
        ];

        let state = {
            currentLesson: 1,
            completed: JSON.parse(localStorage.getItem('py_completed')) || []
        };

        function init() {
            renderNav();
            renderVideos();
            loadLesson(state.currentLesson);
            updateProgress();
        }

        function renderNav() {
            const nav = document.getElementById('nav-list');
            nav.innerHTML = lessons.map(l => `
                <button class="nav-item ${state.currentLesson === l.id ? 'active' : ''} ${state.completed.includes(l.id) ? 'done' : ''}" 
                        id="ni-${l.id}" onclick="loadLesson(${l.id})">
                    <span class="nav-num">${l.id.toString().padStart(2, '0')}</span>
                    <span class="nav-name">${l.title}</span>
                    <span class="nav-check">✔</span>
                </button>
            `).join('');
        }

        function loadLesson(id) {
            state.currentLesson = id;
            const lesson = lessons.find(l => l.id === id);
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeNav = document.getElementById(`ni-${id}`);
            if(activeNav) activeNav.classList.add('active');
            
            document.getElementById('head-title').innerText = lesson.title;
            document.getElementById('lesson-content-area').innerHTML = `
                <h1 class="neon-text">${lesson.title}</h1>
                <p style="color: var(--nitro-blue); margin-bottom: 20px;">[ ${lesson.subtitle} ]</p>
                <div class="ide-widget">
                    <div class="ide-header">
                        <div class="ide-file-info">main.py</div>
                        <button class="run-btn" onclick="runSimulation(${id}, this)">ВЫПОЛНИТЬ</button>
                    </div>
                    <div class="ide-body"><pre><code>${lesson.code}</code></pre></div>
                    <div class="ide-terminal" id="term-${id}">
                        <div class="term-head">ВЫВОД</div>
                        <div class="term-line"><span class="term-prefix">>>></span> <span id="out-${id}">...</span></div>
                    </div>
                </div>
                <button class="next-lesson-btn" onclick="completeStep(${id})">ЗАВЕРШИТЬ ЭТАП</button>
            `;
            if(window.innerWidth < 900) toggleMobileNav();
        }

        function runSimulation(id, btn) {
            btn.innerText = "ЗАГРУЗКА...";
            const out = document.getElementById(`out-${id}`);
            const term = document.getElementById(`term-${id}`);
            setTimeout(() => {
                term.classList.add('active');
                out.innerText = lessons.find(l => l.id === id).out;
                out.style.color = "var(--matrix-green)";
                btn.innerText = "ГОТОВО";
                showToast("Модуль выполнен успешно");
            }, 600);
        }

        function completeStep(id) {
            if(!state.completed.includes(id)) {
                state.completed.push(id);
                localStorage.setItem('py_completed', JSON.stringify(state.completed));
                document.getElementById(`ni-${id}`).classList.add('done');
            }
            updateProgress();
            if(id < lessons.length) loadLesson(id + 1);
            else document.getElementById('finish-overlay').classList.add('active');
        }

        function updateProgress() {
            const percent = Math.round((state.completed.length / lessons.length) * 100);
            document.getElementById('p-fill').style.width = percent + '%';
            document.getElementById('p-val').innerText = percent + '%';
        }

        function renderVideos() {
            const container = document.getElementById('video-grid-container');
            container.innerHTML = HARDCODED_VIDEOS.map((v) => `
                <div class="video-card">
                    <div class="v-icon-layer">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                    </div>
                    <div class="v-title">${v.title}</div>
                    <div class="v-desc">${v.desc}</div>
                    <button class="v-btn-watch" onclick="window.open('${v.url}', '_blank')">СМОТРЕТЬ</button>
                </div>
            `).join('');
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        window.toggleMobileNav = () => document.getElementById('sidebar').classList.toggle('active');

        window.switchMainTab = (view, btn) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            if(view === 'videos') document.getElementById('head-title').innerText = "Медиатека";
            else loadLesson(state.currentLesson);
        };

        window.resetCourse = () => { localStorage.clear(); location.reload(); };

        init();
    </script>
</body>
                </html>
